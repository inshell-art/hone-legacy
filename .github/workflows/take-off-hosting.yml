name: Take off Firebase Hosting

on:
  workflow_dispatch:

jobs:
  disable-hosting:
    runs-on: ubuntu-latest
    steps:
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Disable production hosting sites
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase hosting:disable --project hone-prod --site hone-prod --token "$FIREBASE_TOKEN" --force
          firebase hosting:disable --project facets-prod --site facets-prod --token "$FIREBASE_TOKEN" --force
